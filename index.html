<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR Cambridge Nationals Creative iMedia R093 Exam Trainer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo-container">
            <div class="menu-btn" id="menu-btn" onclick="toggleNav()">
                <div class="bar" id="bar1"></div>
                <div class="bar" id="bar2"></div>
                <div class="bar" id="bar3"></div>
            </div>
            <a href="#" class="logo" onclick="showMenu()">iMedia Hub | Exam Trainer</a>
        </div>
        <div class="theme-toggle" onclick="toggleDarkMode()">🌙</div>
    </nav>

    <div class="sidebar" id="sidebar">
        <ul>
            <li><a href="#" onclick="showMenu()">Main Menu</a></li>
            <li><a href="#" onclick="startSession('TEST')">Full Timed Test</a></li>
            <li><a href="#" onclick="startSession('Long Questions (6-12 Marks)')">Long Questions</a></li>
        </ul>
    </div>

    <div id="main-content">
        <div id="game-container" class="content-animate">

            <div id="progress-wrapper" class="hidden">
                <div id="progress-bar"></div>
            </div>

            <div id="header-info" class="hidden">
                <div id="topic-display"></div>
                <div id="timer-display"></div>
                <div id="score-display">Score: 0</div>
            </div>

            <div id="main-menu">
                <h1 style="color: var(--dark-purple);">OCR Cambridge Nationals Creative iMedia R093 EXAM TRAINER</h1>

                <div id="past-papers-section">
                    <h2>PAST PAPERS & EXAM PRACTICE</h2>
                    <div id="past-papers-grid"></div>
                    <button id="long-q-btn" onclick="startSession('Long Questions (6-12 Marks)')">PRACTICE LONG
                        QUESTIONS (6-12 MARKS)</button>
                </div>

                <hr
                    style="border-top: 2px solid var(--border-color); margin: 30px 0; border-bottom: none; border-left: none; border-right: none;">

                <h2>BITE-SIZED REVISION</h2>
                <button id="full-test-btn" onclick="startSession('TEST')">START FULL TEST (25 RANDOM - TIMED)</button>
                <div id="topic-grid"></div>
            </div>

            <div id="quiz-area" class="hidden">
                <div class="card" style="margin-bottom: 20px;">
                    <h2 id="question-text" style="margin: 0;"></h2>
                </div>

                <div id="options-container"></div>
                <textarea id="long-answer-box" class="hidden" rows="8"
                    placeholder="Type your extended answer here..."></textarea>
                <div id="feedback-area"></div>

                <div id="nav-controls">
                    <button class="leave-btn" onclick="showMenu()">LEAVE TOPIC</button>
                    <button id="hint-btn" onclick="showHint()">NEED A HINT?</button>
                    <button id="continue-btn" class="hidden" onclick="nextQuestion()">CONTINUE</button>
                </div>
            </div>

            <div id="results-area" class="hidden text-center">
                <div class="card" style="text-align: center; padding: 40px;">
                    <h1>SESSION COMPLETE</h1>
                    <p id="final-score-text" style="font-size: 2rem; color: var(--dark-purple); font-weight: bold;"></p>
                    <button id="full-test-btn" style="margin-top: 20px;" onclick="showMenu()">RETURN TO MAIN
                        MENU</button>
                </div>
            </div>

        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
